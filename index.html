<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESNTL Vault Inventory</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, select, textarea {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .info {
      font-size: 14px;
      margin: 4px 0;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .qty {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 10px;
      border-radius: 20px;
      background: #eee;
      font-size: 13px;
    }

    .type-badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 9px;
      border-radius: 20px;
      background: #111;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .sold-btn {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .sold-btn:hover {
      background: #333;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 700px;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-full {
      grid-column: span 2;
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .modal label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      margin-top: 5px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }

    .submit-btn {
      background: #111;
      color: white;
    }

    .cancel-btn {
      background: #ddd;
    }

    #statusMessage {
      margin-top: 12px;
      font-size: 14px;
      font-weight: bold;
    }

    #loadingMessage {
      text-align: center;
      color: #666;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-full {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

  <h1>ESNTL Vault</h1>
  <div class="subtitle">Current Card Inventory</div>

  <div class="controls">
    <select id="inventoryType">
      <option value="singles">Singles</option>
      <option value="sealed">Sealed</option>
    </select>

    <input type="text" id="searchInput" placeholder="Search item name..." />

    <select id="setFilter">
      <option value="">All Sets</option>
    </select>

    <select id="conditionFilter">
      <option value="">All Conditions</option>
    </select>

    <select id="sortSelect">
      <option value="">Sort</option>
      <option value="priceLow">Price: Low to High</option>
      <option value="priceHigh">Price: High to Low</option>
      <option value="nameAZ">Name: A-Z</option>
    </select>
  </div>

  <div id="loadingMessage">Loading inventory...</div>
  <div id="inventory" class="grid"></div>

  <!-- SOLD MODAL -->
  <div id="soldModal" class="modal-overlay">
    <div class="modal">
      <h2>Log Sale</h2>

      <div class="form-grid">
        <div class="form-full">
          <label>Passcode</label>
          <input type="password" id="passcodeInput" placeholder="Enter passcode" />
        </div>

        <div>
          <label>Type</label>
          <input type="text" id="typeInput" readonly />
        </div>

        <div>
          <label>Product Name</label>
          <input type="text" id="productNameInput" readonly />
        </div>

        <div>
          <label>Set</label>
          <input type="text" id="setInput" readonly />
        </div>

        <div>
          <label>Card #</label>
          <input type="text" id="cardNumberInput" readonly />
        </div>

        <div>
          <label>Condition</label>
          <input type="text" id="conditionInput" readonly />
        </div>

        <div>
          <label>Qty Sold</label>
          <input type="number" id="qtySoldInput" value="1" min="1" />
        </div>

        <div>
          <label>Sold Price</label>
          <input type="number" id="soldPriceInput" step="0.01" />
        </div>

        <div>
          <label>Payment Method</label>
          <select id="paymentMethodInput">
            <option value="">Select</option>
            <option>Cash</option>
            <option>Venmo</option>
            <option>Cash App</option>
            <option>Zelle</option>
            <option>Card</option>
            <option>Trade</option>
          </select>
        </div>

        <div>
          <label>Customer/Event</label>
          <input type="text" id="customerEventInput" />
        </div>

        <div class="form-full">
          <label>Notes</label>
          <textarea id="notesInput" rows="2"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeSoldModal()">Cancel</button>
        <button class="submit-btn" onclick="submitSale()">Submit Sale</button>
      </div>

      <div id="statusMessage"></div>
    </div>
  </div>

  <script>
    const csvLinks = {
      singles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSF9FO8t7Ake0qvxB4g0M9xw5WMILHKw19Wg0HGuQf-AA0yHnjjBfJzyAbKg0kEbGGX2m7pQmY8nX9H/pub?gid=2036564200&single=true&output=csv",
      sealed: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSF9FO8t7Ake0qvxB4g0M9xw5WMILHKw19Wg0HGuQf-AA0yHnjjBfJzyAbKg0kEbGGX2m7pQmY8nX9H/pub?gid=979503658&single=true&output=csv"
    };

    const scriptUrl = "https://script.google.com/macros/s/AKfycbxPF0qRki2vAvqhDbEGeojGS3xMFIkisSI1SsilFwBZ7UqPG0u5CXX9riCu_ejDk5wG/exec";

    let inventoryData = [];
    let currentType = "singles";

    function money(value) {
      const number = parseFloat(String(value || "0").replace("$", "").replace(",", ""));
      return isNaN(number) ? "0.00" : number.toFixed(2);
    }

    function loadInventory() {
      const loading = document.getElementById("loadingMessage");
      const container = document.getElementById("inventory");

      loading.textContent = "Loading inventory...";
      container.innerHTML = "";

      Papa.parse(csvLinks[currentType], {
        download: true,
        header: true,
        complete: function(results) {
          inventoryData = results.data.filter(item => item["Product Name"]);

          document.getElementById("setFilter").innerHTML = '<option value="">All Sets</option>';
          document.getElementById("conditionFilter").innerHTML = '<option value="">All Conditions</option>';

          populateFilters();
          renderInventory();

          loading.textContent = inventoryData.length ? "" : "No inventory found.";
        },
        error: function() {
          loading.textContent = "Error loading inventory.";
        }
      });
    }

    function populateFilters() {
      const setFilter = document.getElementById("setFilter");
      const conditionFilter = document.getElementById("conditionFilter");

      const sets = [...new Set(inventoryData.map(item => item["Set"]).filter(Boolean))].sort();
      const conditions = [...new Set(inventoryData.map(item => item["Condition"]).filter(Boolean))].sort();

      sets.forEach(set => {
        const option = document.createElement("option");
        option.value = set;
        option.textContent = set;
        setFilter.appendChild(option);
      });

      conditions.forEach(condition => {
        const option = document.createElement("option");
        option.value = condition;
        option.textContent = condition;
        conditionFilter.appendChild(option);
      });
    }

    function renderInventory() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const set = document.getElementById("setFilter").value;
      const condition = document.getElementById("conditionFilter").value;
      const sort = document.getElementById("sortSelect").value;

      let filtered = inventoryData.filter(item => {
        return (
          String(item["Product Name"] || "").toLowerCase().includes(search) &&
          (set === "" || item["Set"] === set) &&
          (condition === "" || item["Condition"] === condition)
        );
      });

      if (sort === "priceLow") {
        filtered.sort((a, b) => parseFloat(a["Market Price"] || 0) - parseFloat(b["Market Price"] || 0));
      }

      if (sort === "priceHigh") {
        filtered.sort((a, b) => parseFloat(b["Market Price"] || 0) - parseFloat(a["Market Price"] || 0));
      }

      if (sort === "nameAZ") {
        filtered.sort((a, b) => String(a["Product Name"] || "").localeCompare(String(b["Product Name"] || "")));
      }

      const container = document.getElementById("inventory");
      container.innerHTML = "";

      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const itemType = item["Type"] || (currentType === "sealed" ? "Sealed" : "Single");

        card.innerHTML = `
          <span class="type-badge">${itemType}</span>
          <h3>${item["Product Name"] || ""}</h3>
          <div class="info"><strong>Set:</strong> ${item["Set"] || ""}</div>
          <div class="info"><strong>Card #:</strong> ${item["Card #"] || ""}</div>
          <div class="info"><strong>Rarity:</strong> ${item["Rarity"] || ""}</div>
          <div class="info"><strong>Variant:</strong> ${item["Variant"] || ""}</div>
          <div class="info"><strong>Grade:</strong> ${item["Grade"] || ""}</div>
          <div class="info"><strong>Condition:</strong> ${item["Condition"] || ""}</div>
          <div class="price">$${money(item["Market Price"])}</div>
          <div class="qty">Qty: ${item["Qty"] || "0"}</div>
          <button class="sold-btn" onclick='openSoldModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Sold</button>
        `;

        container.appendChild(card);
      });
    }

    function openSoldModal(item) {
      const itemType = item["Type"] || (currentType === "sealed" ? "Sealed" : "Single");

      document.getElementById("soldModal").style.display = "flex";
      document.getElementById("statusMessage").textContent = "";

      document.getElementById("passcodeInput").value = "";
      document.getElementById("typeInput").value = itemType;
      document.getElementById("productNameInput").value = item["Product Name"] || "";
      document.getElementById("setInput").value = item["Set"] || "";
      document.getElementById("cardNumberInput").value = item["Card #"] || "";
      document.getElementById("conditionInput").value = item["Condition"] || "";
      document.getElementById("qtySoldInput").value = "1";
      document.getElementById("soldPriceInput").value = money(item["Market Price"]);
      document.getElementById("paymentMethodInput").value = "";
      document.getElementById("customerEventInput").value = "";
      document.getElementById("notesInput").value = "";
    }

    function closeSoldModal() {
      document.getElementById("soldModal").style.display = "none";
    }

    async function submitSale() {
      const status = document.getElementById("statusMessage");
      status.textContent = "Submitting...";

      const payload = {
        type: document.getElementById("typeInput").value,
        passcode: document.getElementById("passcodeInput").value,
        productName: document.getElementById("productNameInput").value,
        set: document.getElementById("setInput").value,
        cardNumber: document.getElementById("cardNumberInput").value,
        condition: document.getElementById("conditionInput").value,
        qtySold: document.getElementById("qtySoldInput").value,
        soldPrice: document.getElementById("soldPriceInput").value,
        paymentMethod: document.getElementById("paymentMethodInput").value,
        customerEvent: document.getElementById("customerEventInput").value,
        notes: document.getElementById("notesInput").value
      };

      try {
        await fetch(scriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        status.textContent = "Sale submitted. Refreshing inventory...";

        setTimeout(() => {
          closeSoldModal();
          loadInventory();
        }, 1500);

      } catch (error) {
        status.textContent = "Error submitting sale. Try again.";
      }
    }

    document.getElementById("inventoryType").addEventListener("change", function() {
      currentType = this.value;
      document.getElementById("searchInput").value = "";
      document.getElementById("sortSelect").value = "";
      loadInventory();
    });

    document.getElementById("searchInput").addEventListener("input", renderInventory);
    document.getElementById("setFilter").addEventListener("change", renderInventory);
    document.getElementById("conditionFilter").addEventListener("change", renderInventory);
    document.getElementById("sortSelect").addEventListener("change", renderInventory);

    loadInventory();
  </script>

</body>
</html>
